services:
  postgres:
    image: postgres:16-alpine
    container_name: beyondcampus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: beyondcampus
      POSTGRES_USER: beyondcampus
      POSTGRES_PASSWORD: beyondcampus
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beyondcampus -d beyondcampus"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
